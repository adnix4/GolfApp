# ─────────────────────────────────────────────────────────────────────────────
# infra/docker-compose.yml — Golf Fundraiser Pro Local Development Stack
# ─────────────────────────────────────────────────────────────────────────────
#
# WHAT THIS FILE DOES:
#   Runs every backend service needed for local development in Docker containers.
#   The .NET API runs OUTSIDE Docker (via `dotnet run` in apps/api) for hot-
#   reload speed.  It connects to the Dockerized database, Redis, and pgAdmin.
#
# HOW TO START:
#   From the repo root:
#     cd infra && docker compose up -d
#   Then in a separate terminal:
#     cd apps/api && dotnet run
#
# SERVICES:
#   postgres  — PostgreSQL 16 with PostGIS 3.4 extension (REQUIRED — not plain postgres)
#   redis     — Redis 7 for leaderboard caching and SignalR backplane (Phase 3)
#   pgadmin   — pgAdmin4 web UI for inspecting the database during development
#
# WHAT IS NOT IN THIS FILE (intentionally):
#   • The .NET API  — runs locally via `dotnet run` for hot-reload
#   • apps/admin    — runs via `npm run dev` in the Expo Router workspace
#   • apps/web      — runs via `npm run dev` in the Next.js workspace
#   • apps/mobile   — runs via `expo start` in the Expo workspace
#   In production, each app has its own deploy target (Railway, Vercel, EAS).
#
# CRITICAL DIFFERENCE FROM THE OLD docker-compose.yml:
#   OLD: image: postgres:16-alpine        ← WRONG — no PostGIS, GPS features break
#   NEW: image: postgis/postgis:16-3.4    ← CORRECT per spec Foundation §8
#
#   OLD: DB=appdb, user=appuser           ← WRONG — doesn't match spec credentials
#   NEW: DB=golf_fundraiser, user=gfp     ← CORRECT per spec Foundation §8
#
#   OLD: no Redis service                 ← MISSING — leaderboard cache won't work
#   NEW: Redis 7 added                    ← CORRECT per spec Foundation §3
#
#   OLD: no pgAdmin                       ← MISSING — harder to inspect data
#   NEW: pgAdmin4 added on port 5050      ← CORRECT per spec Foundation §8

version: '3.9'

services:

  # ── POSTGRESQL + POSTGIS ────────────────────────────────────────────────────
  postgres:
    #
    # WHY postgis/postgis:16-3.4 and NOT postgres:16-alpine:
    #   The spec requires PostGIS 3.4 because the database schema uses
    #   GEOGRAPHY(Point,4326) columns in courses, course_holes, and scores tables.
    #   These are needed for:
    #     Phase 1: courses.location (basic course lat/lon)
    #     Phase 6: cup_location, drive_location, ball_location (GPS measurement)
    #   plain postgres:16-alpine does NOT include PostGIS — those column types
    #   would fail to create and GPS features would be completely broken.
    #
    #   The EF Core migration's Up() method runs:
    #     migrationBuilder.Sql("CREATE EXTENSION IF NOT EXISTS postgis;")
    #   That command only succeeds if the postgis shared library is present,
    #   which only the postgis/postgis image provides.
    #
    image: postgis/postgis:16-3.4

    container_name: gfp-postgres

    # Restart automatically on Docker daemon restart (development convenience)
    restart: unless-stopped

    environment:
      #
      # CREDENTIALS — these match the spec Foundation §8 exactly.
      # The apps/api appsettings.Development.json and the .env.local files
      # reference these exact values.
      #
      # WHY NOT "appdb" / "appuser" (the old values):
      #   The old credentials were generic placeholders from the scaffold.
      #   Using GFP-specific credentials makes it immediately obvious which
      #   database you're connected to in pgAdmin and in log output.
      #
      POSTGRES_DB:       golf_fundraiser
      POSTGRES_USER:     gfp
      POSTGRES_PASSWORD: gfp_local   # local dev only — never used in production

    ports:
      #
      # 5432:5432 — expose PostgreSQL on the standard port so:
      #   • The .NET API (running locally) can connect via localhost:5432
      #   • Database tools like TablePlus or DataGrip can connect directly
      #   • pgAdmin (in another container) connects via the Docker network
      #
      - "5432:5432"

    volumes:
      #
      # Named volume — persists database data between `docker compose down` runs.
      # Without this, your seed data disappears every time you restart Docker.
      # `docker compose down -v` will wipe it (intentional for clean resets).
      #
      - pgdata:/var/lib/postgresql/data

      #
      # Init scripts — any .sql or .sh file placed in docker-entrypoint-initdb.d/
      # is executed when the container is FIRST created (on a fresh volume).
      # We use this to ensure the postgis extension is enabled at DB creation time
      # as a safety net (the EF migration also does this, but belt-and-suspenders).
      #
      - ./init-scripts:/docker-entrypoint-initdb.d

    healthcheck:
      #
      # pg_isready checks that PostgreSQL is accepting connections.
      # Other services that depend_on postgres use this to know when it's ready.
      # Without a healthcheck, the API might try to connect before Postgres is up.
      #
      test:     ["CMD-SHELL", "pg_isready -U gfp -d golf_fundraiser"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s  # PostGIS image takes longer to init than plain postgres

    networks:
      - gfp-network

  # ── REDIS ───────────────────────────────────────────────────────────────────
  redis:
    #
    # WHY REDIS IS REQUIRED (not optional):
    #   Phase 3 uses Redis for two separate purposes:
    #
    #   1. LEADERBOARD CACHE (spec §3, Technology Stack):
    #      "Leaderboard TTL cache (2–5s). StackExchange.Redis."
    #      The leaderboard endpoint is hit by every browser watching the live
    #      leaderboard.  Without Redis, every request recalculates standings
    #      from raw score rows — expensive at 25 teams × many concurrent viewers.
    #      Redis caches the computed leaderboard JSON for 2–5 seconds.
    #
    #   2. SIGNALR BACKPLANE (spec §3):
    #      "Redis backplane for multi-instance."
    #      If the API is scaled to multiple instances (Railway/Render horizontal
    #      scaling), SignalR messages must cross instance boundaries.  The Redis
    #      backplane routes SignalR hub messages between instances.
    #      Without it, a score update submitted to Instance A would only push
    #      to clients connected to Instance A — not all viewers.
    #
    # WHY PHASE 1 INCLUDES IT:
    #   The API connects to Redis at startup. Adding it now means Phase 3
    #   is a code addition, not an infrastructure change.
    #   In Phase 1 the Redis connection is established but mostly idle.
    #
    image: redis:7-alpine

    container_name: gfp-redis

    restart: unless-stopped

    ports:
      #
      # 6379:6379 — standard Redis port.
      # The .NET API connects via localhost:6379 when running outside Docker.
      #
      - "6379:6379"

    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    #
    # COMMAND OPTIONS EXPLAINED:
    #   --maxmemory 256mb         — cap Redis memory usage for local dev
    #   --maxmemory-policy allkeys-lru — evict least-recently-used keys when full
    #   --save ""                 — disable RDB persistence (dev only; cache data
    #                               is ephemeral by design — it's a cache)
    #   --appendonly no           — disable AOF persistence (same reason)
    #
    # In production, persistence settings would be reconsidered based on
    # whether the Redis instance is purely a cache or also a message queue.

    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  3

    networks:
      - gfp-network

  # ── PGADMIN ─────────────────────────────────────────────────────────────────
  pgadmin:
    #
    # WHY PGADMIN IS INCLUDED:
    #   pgAdmin4 is a web-based PostgreSQL GUI.  During development it lets you:
    #     • Inspect tables after EF Core migrations run
    #     • Run ad-hoc SQL queries (e.g. check that PostGIS is enabled)
    #     • View JSONB column contents with formatted display
    #     • Debug foreign key violations and unique constraint errors
    #
    #   Access: http://localhost:5050
    #   Email:  admin@local.dev   (matches spec Foundation §8)
    #   Pass:   admin             (matches spec Foundation §8)
    #
    # PRODUCTION NOTE:
    #   pgAdmin is NOT deployed to production — it is a dev-only tool.
    #   The production compose/Railway config does not include this service.
    #
    image: dpage/pgadmin4

    container_name: gfp-pgadmin

    restart: unless-stopped

    environment:
      #
      # These credentials match the spec Foundation §8 exactly.
      # They are for the pgAdmin login UI — separate from the PostgreSQL credentials.
      #
      PGADMIN_DEFAULT_EMAIL:    admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin

      #
      # PGADMIN_CONFIG_SERVER_MODE=False runs pgAdmin in "desktop mode" which
      # skips the multi-user auth layer.  Fine for local dev where only you
      # have access to localhost:5050.
      #
      PGADMIN_CONFIG_SERVER_MODE: "False"

    ports:
      # 5050:80 — access pgAdmin at http://localhost:5050
      # Port 80 is pgAdmin's internal port; we expose it on 5050 to avoid
      # conflicts with other services that might use port 80.
      - "5050:80"

    volumes:
      #
      # Persist pgAdmin server configurations between restarts.
      # Without this, you'd need to re-add the PostgreSQL server connection
      # every time pgAdmin starts.
      #
      - pgadmin-data:/var/lib/pgadmin

      #
      # Pre-configure the PostgreSQL server connection so it appears in pgAdmin
      # automatically on first launch (no manual "Add Server" step needed).
      #
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro

    depends_on:
      postgres:
        condition: service_healthy  # wait for postgres to be ready before starting

    networks:
      - gfp-network

# ── VOLUMES ───────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    #
    # Named volume for PostgreSQL data files.
    # Lives at /var/lib/docker/volumes/infra_pgdata/ on the Docker host.
    # To wipe and start fresh: docker compose down -v
    #
    name: gfp_pgdata

  pgadmin-data:
    #
    # Named volume for pgAdmin configuration (saved server connections, etc.)
    #
    name: gfp_pgadmin_data

# ── NETWORKS ──────────────────────────────────────────────────────────────────
networks:
  gfp-network:
    #
    # Custom bridge network with a recognisable name.
    # All containers in this compose file can reach each other by service name:
    #   postgres  → hostname "postgres"  on the network
    #   redis     → hostname "redis"     on the network
    #   pgadmin   → hostname "pgadmin"   on the network
    #
    # The .NET API (running on the host) connects via localhost:5432 / localhost:6379.
    # pgAdmin (in a container) connects to postgres via the service name "postgres".
    #
    name: gfp_network
    driver: bridge
