version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: multiservice-postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multiservice-api
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=appdb;Username=appuser;Password=apppassword"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multiservice-frontend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000"
    ports:
      - "3000:3000"
    depends_on:
      - api

  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: multiservice-mobile
    environment:
      EXPO_PUBLIC_API_URL: "http://localhost:5000"
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
    volumes:
      - ./mobile:/app
      - /app/node_modules
    depends_on:
      - api
    develop:
      watch:
        - path: ./mobile
          action: sync
          target: /app
          ignore:
            - node_modules
            - .expo

volumes:
  postgres_data:

networks:
  default:
    name: multiservice-network
