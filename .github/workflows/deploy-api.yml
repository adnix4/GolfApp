# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/deploy-api.yml — Deploy ASP.NET Core API
# ─────────────────────────────────────────────────────────────────────────────
#
# WHEN THIS RUNS:
#   Only on push to main (i.e., after a PR is merged).
#   Never on pull_request — we don't deploy from feature branches.
#
# WHAT IT DOES:
#   1. Builds a Docker image from apps/api/Dockerfile
#   2. Pushes the image to GitHub Container Registry (ghcr.io)
#   3. Triggers a Railway deployment using the new image
#
# SECRETS REQUIRED (GitHub → Settings → Secrets → Actions):
#   RAILWAY_TOKEN  — Railway API token for deployment
#                    Get at: https://railway.app/account/tokens
#   RAILWAY_SERVICE_ID — the Railway service ID for the API
#                    Found in Railway dashboard → Service → Settings → General
#
# WHY RAILWAY (not Render):
#   Railway supports Docker deploys with custom Dockerfiles, has a generous
#   free tier, and supports the DATABASE_URL / REDIS_URL env var format.
#   Either works; just update the deploy step if using Render instead.
#
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy API

on:
  push:
    branches: [main]
    paths:
      # Only trigger this workflow when API code actually changed.
      # Changing only the Next.js frontend doesn't need an API redeploy.
      - 'apps/api/**'
      - '.github/workflows/deploy-api.yml'

# Prevent simultaneous deployments — only one deploy at a time.
concurrency:
  group: deploy-api
  cancel-in-progress: false  # Don't cancel in-progress deploys — let them finish

jobs:
  deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest

    # Grant permission to push Docker images to GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        # ghcr.io (GitHub Container Registry) is free for public repos.
        # For private repos it uses your GitHub package quota.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # Auto-provided by GitHub Actions

      - name: Extract Docker metadata
        # Generates image tags and labels from git metadata.
        # Tags the image with both the git SHA (for precise rollbacks) and
        # "latest" (for easy reference).
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        # Buildx enables advanced Docker build features:
        #   • Multi-platform builds (amd64 + arm64 for Apple Silicon CI runners)
        #   • BuildKit cache mounts (speeds up repeated builds)
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          # apps/api/Dockerfile uses multi-stage build:
          #   Stage 1 (sdk image):   dotnet publish -c Release
          #   Stage 2 (aspnet image): copies published output, minimal runtime image
          file:    apps/api/Dockerfile
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}

          # Cache Docker layers between builds using GitHub Actions cache.
          # Dramatically speeds up builds when only a few files changed.
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Deploy to Railway
        # Triggers Railway to pull and deploy the new image.
        # Railway will run database migrations automatically via the
        # ENTRYPOINT in the Dockerfile (dotnet run --migrate if configured).
        uses: bervProject/railway-deploy@v1.0.0
        with:
          railway_token:  ${{ secrets.RAILWAY_TOKEN }}
          service:        ${{ secrets.RAILWAY_SERVICE_ID }}

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ API deployed successfully"
          echo "Image: ghcr.io/${{ github.repository }}/api:sha-${{ github.sha }}"
