# ─────────────────────────────────────────────────────────────────────────────
# infra/nginx.conf — Local Development Reverse Proxy
# ─────────────────────────────────────────────────────────────────────────────
#
# WHY THIS EXISTS:
#   During local development, the apps run on different ports:
#     .NET API      → http://localhost:5000
#     Next.js web   → http://localhost:3000
#     Expo admin    → http://localhost:8081
#
#   Without a reverse proxy, the browser enforces CORS (Cross-Origin Resource
#   Sharing) restrictions — a page served from :3000 cannot fetch from :5000
#   without the API explicitly allowing it.
#
#   nginx routes all traffic through a single port (8080) based on URL prefix:
#     http://localhost:8080/api/v1/... → forwards to .NET API on :5000
#     http://localhost:8080/admin/...  → forwards to Expo admin on :8081
#     http://localhost:8080/...        → forwards to Next.js web on :3000
#
#   This mirrors the production setup where a load balancer does the same routing,
#   so local development behaves identically to production.
#
# HOW TO USE:
#   This nginx.conf is optional for Phase 1 — developers can hit each port
#   directly with CORS headers allowed.  It becomes more useful in Phase 3+
#   when WebSocket connections (SignalR) must be proxied correctly.
#
# TO RUN NGINX LOCALLY:
#   Add this service to docker-compose.yml (or run standalone):
#     nginx -c /path/to/infra/nginx.conf
#
# ─────────────────────────────────────────────────────────────────────────────

# worker_processes auto — nginx will spawn one worker per CPU core.
# "auto" is appropriate for development; production would tune this.
worker_processes auto;

events {
  # worker_connections — max simultaneous connections per worker.
  # 1024 is plenty for local dev with a handful of connected browser tabs.
  worker_connections 1024;
}

http {

  # ── UPSTREAM DEFINITIONS ────────────────────────────────────────────────────
  # "upstream" blocks define backend server groups.
  # These names are used in proxy_pass directives below.
  # Using named upstreams (rather than hardcoded URLs) makes it easy to add
  # multiple backend instances for load testing.

  upstream api_backend {
    # The .NET API runs on the host (not in Docker), so we use host.docker.internal
    # on Mac/Windows.  On Linux, use 172.17.0.1 (the Docker bridge gateway IP).
    # The environment variable HOST_IP is set in .env.local to handle both cases.
    server host.docker.internal:5000;

    # keepalive — maintain persistent connections to the API to reduce
    # TCP handshake overhead for high-frequency requests (score submissions,
    # leaderboard polling).
    keepalive 32;
  }

  upstream web_frontend {
    # Next.js development server
    server host.docker.internal:3000;
    keepalive 16;
  }

  upstream admin_frontend {
    # Expo Router web dev server (Expo's Metro bundler serves web output)
    server host.docker.internal:8081;
    keepalive 16;
  }

  # ── COMMON PROXY HEADERS ────────────────────────────────────────────────────
  # These headers are sent to every upstream so backends know the real client IP
  # and the original protocol (http/https).

  # Use HTTP/1.1 for upstream connections (required for keepalive and WebSockets)
  proxy_http_version 1.1;

  # Pass the original Host header so the upstream can generate correct URLs
  proxy_set_header Host              $host;

  # Forward the real client IP address (useful for rate limiting and logging)
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Required for WebSocket support (SignalR in Phase 3)
  # The "Upgrade" and "Connection" headers enable the HTTP→WebSocket protocol upgrade
  proxy_set_header Upgrade    $http_upgrade;
  proxy_set_header Connection "upgrade";

  # ── SERVER BLOCK ─────────────────────────────────────────────────────────────
  server {
    # Listen on port 8080 to avoid requiring sudo (port 80 needs root on Linux)
    listen 8080;
    server_name localhost;

    # ── API ROUTES ──────────────────────────────────────────────────────────
    # All /api/v1/... requests → .NET API
    # Also handles /auth/... for JWT token endpoints
    location ~ ^/(api|auth)/ {
      proxy_pass http://api_backend;

      # Generous timeout for long-running operations (e.g. bulk score sync,
      # PDF generation, email sending)
      proxy_read_timeout    60s;
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;

      # Buffer tuning — disable buffering for streaming responses
      # (important for SignalR Server-Sent Events in Phase 3)
      proxy_buffering off;
    }

    # ── ADMIN ROUTES ────────────────────────────────────────────────────────
    # /admin/... → Expo Router web admin dashboard
    location /admin/ {
      # Strip the /admin prefix before forwarding (Expo Router serves from root)
      rewrite ^/admin/(.*)$ /$1 break;
      proxy_pass http://admin_frontend;
      proxy_read_timeout 30s;
    }

    # ── WEBSOCKET / SIGNALR ROUTES ──────────────────────────────────────────
    # Phase 3: SignalR uses WebSockets and requires special handling.
    # The hub URL is /hubs/tournament (defined in apps/api TournamentHub)
    location /hubs/ {
      proxy_pass http://api_backend;

      # WebSocket connections are long-lived — extend timeouts significantly
      proxy_read_timeout    3600s;  # 1 hour
      proxy_send_timeout    3600s;
      proxy_connect_timeout 10s;

      # Disable buffering for real-time data streams
      proxy_buffering off;

      # These headers enable the WebSocket protocol upgrade handshake
      # proxy_set_header Upgrade and Connection are already set in the http block
    }

    # ── PUBLIC WEB ROUTES ───────────────────────────────────────────────────
    # Everything else → Next.js (public leaderboard, landing pages)
    location / {
      proxy_pass http://web_frontend;
      proxy_read_timeout 30s;

      # Next.js HMR (Hot Module Replacement) uses WebSockets in development
      # The Upgrade header set in the http block handles this automatically
    }

    # ── ERROR PAGES ─────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
      # Inline error page — shown when a backend service is not yet running
      return 503 "GFP: Backend service unavailable. Run `docker compose up -d` in /infra then `dotnet run` in apps/api.";
    }
  }
}